<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NEXORA - Tap The Future</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Yahan wahi purani CSS hai, maine koi change nahi kiya */
        *{margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; -webkit-user-select: none; user-select: none;}
        body{background:#020617; overflow:hidden; color:white; height:100vh;}
        .bg{position:fixed; width:100%; height:100%; background:radial-gradient(circle at top,#0ea5e9 0%,transparent 30%), radial-gradient(circle at bottom,#7c3aed 0%,transparent 30%), #020617; z-index:-3;}
        .stars{position:fixed; width:100%; height:100%; overflow:hidden; z-index:-2;}
        .star{position:absolute; width:2px; height:2px; background:white; border-radius:50%; animation: twinkle 3s infinite;}
        @keyframes twinkle{0%,100%{opacity:0.2;} 50%{opacity:1;}}
        .app{width:100%; max-width:420px; height:100vh; margin:auto; padding:20px; position:relative; overflow:hidden;}
        .screen {display: none; height: calc(100vh - 150px); overflow-y: auto; padding-top: 10px;}
        .screen.active {display: block; animation: fadeIn 0.3s ease-in-out;}
        @keyframes fadeIn {from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); }}
        .header{display:flex; justify-content:space-between; align-items:center; margin-top:10px; margin-bottom: 20px;}
        .logo{font-size:28px; font-weight:700; background:linear-gradient(90deg,#38bdf8,#a855f7); -webkit-background-clip:text; -webkit-text-fill-color:transparent;}
        .user-profile{display: flex; align-items: center; gap: 8px; background:rgba(255,255,255,0.08); padding:6px 12px; border-radius:15px; backdrop-filter:blur(10px); font-size:13px; border:1px solid rgba(255,255,255,0.1);}
        .card{padding:20px; border-radius:30px; background:rgba(255,255,255,0.06); backdrop-filter:blur(15px); border:1px solid rgba(255,255,255,0.1); box-shadow:0 0 30px rgba(0,255,255,0.1); margin-bottom: 20px;}
        .coins{text-align:center; margin-top:10px; margin-bottom: 15px;}
        .coins h1{font-size:46px; color:#facc15; text-shadow: 0 0 15px rgba(250,204,21,0.3);}
        .energy{margin-top:20px;}
        .energy-top{display:flex; justify-content:space-between; margin-bottom:8px; font-size:14px;}
        .bar{height:18px; background:rgba(255,255,255,0.08); border-radius:30px; overflow:hidden;}
        .fill{height:100%; width:100%; background:linear-gradient(90deg,#22c55e,#06b6d4); border-radius:30px; transition:0.3s;}
        .tap-area{display:flex; justify-content:center; margin-top:35px;}
        .tap-btn{width:220px; height:220px; border-radius:50%; border:none; cursor:pointer; background:radial-gradient(circle at top,#67e8f9,#2563eb); box-shadow:0 0 20px #0ea5e9, 0 0 60px rgba(14,165,233,0.4), inset 0 0 30px rgba(255,255,255,0.2); font-size:46px; font-weight:700; color:white; transition:0.1s;}
        .tap-btn:active{transform:scale(0.92);}
        .level{margin-top:25px; text-align:center; font-size:22px;}
        .section-title{margin-bottom:15px; font-size:20px; font-weight:600; background: linear-gradient(90deg, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
        .list-item {display: flex; align-items: center; justify-content: space-between; padding: 16px; background: rgba(255,255,255,0.05); border-radius: 20px; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 12px; transition: 0.2s; cursor: pointer;}
        .list-item:hover {background: rgba(255,255,255,0.1); transform: translateY(-2px);}
        .item-detail {display: flex; align-items: center; gap: 15px;}
        .item-icon {font-size: 26px; background: rgba(255,255,255,0.08); width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 15px;}
        .item-info h3 {font-size: 15px; font-weight: 600;}
        .item-info p {font-size: 12px; color: #94a3b8;}
        .reward-tag {color: #facc15; font-weight: bold; font-size: 14px;}
        .wallet-container {text-align: center; padding: 40px 20px;}
        .wallet-icon {font-size: 64px; margin-bottom: 20px; animation: pulse 2s infinite;}
        @keyframes pulse {0%, 100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.05); opacity: 1; }}
        .connect-btn {width: 100%; padding: 16px; border: none; border-radius: 20px; font-size: 16px; font-weight: 700; color: white; background: linear-gradient(90deg, #0098ea, #00c6ff); box-shadow: 0 4px 20px rgba(0, 152, 234, 0.4); cursor: pointer; transition: 0.2s;}
        .connect-btn:active {transform: scale(0.97);}
        .nav{position:fixed; bottom:15px; left:50%; transform:translateX(-50%); width:92%; max-width:420px; display:flex; justify-content:space-around; padding:12px; background:rgba(15, 23, 42, 0.6); border-radius:25px; backdrop-filter:blur(25px); border:1px solid rgba(255,255,255,0.08); z-index: 1000;}
        .nav-item{text-align:center; font-size:12px; color: #64748b; cursor: pointer; transition: 0.2s; flex: 1;}
        .nav-item.active {color: #38bdf8; font-weight: 600; transform: scale(1.1);}
        .nav-item span {font-size: 22px; display: block; margin-bottom: 2px;}
        .float{position:absolute; font-weight:700; color:#facc15; font-size: 24px; animation:up 0.8s ease-out forwards; pointer-events:none; z-index: 100; text-shadow: 0 2px 10px rgba(0,0,0,0.5);}
        @keyframes up{0%{opacity:1; transform:translateY(0) scale(1);} 100%{opacity:0; transform:translateY(-100px) scale(0.8);}}
    </style>
</head>
<body>
    <div id="loadingScreen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#020617; z-index:9999; display:flex; justify-content:center; align-items:center; font-size:22px; font-weight:bold; color:#38bdf8; transition: opacity 0.5s;">⚡ Loading NEXORA...</div>
    <div class="app">
        <div class="header"><div class="logo">⚡ NEXORA</div><div class="user-profile">🟢 <span id="tgName">Loading...</span></div></div>
        <div id="screen-home" class="screen active"><div class="card"><div class="coins"><p>Total Balance</p><h1 id="coins">0</h1></div><div class="energy"><div class="energy-top"><span>⚡ Energy</span><span id="energyText">100/100</span></div><div class="bar"><div class="fill" id="fill"></div></div></div><div class="tap-area"><button class="tap-btn" id="tapBtn">🚀</button></div><div class="level">Rank: <span id="rank">Rookie</span></div></div></div>
        <div id="screen-earn" class="screen">...</div>
        <div id="screen-boost" class="screen">...</div>
        <div id="screen-wallet" class="screen">...</div>
    </div>
    <div class="nav">...</div>
    <script src="App.js"></script>
</body>
</html>
