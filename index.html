<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXORA - Tap Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body{background:#020617; color:white; font-family:sans-serif; margin:0; overflow:hidden; display:flex; justify-content:center;}
        .app{width:100%; max-width:420px; height:100vh; padding:20px; text-align:center;}
        .tap-btn{width:200px; height:200px; border-radius:50%; border:none; background:radial-gradient(#67e8f9,#2563eb); font-size:40px; cursor:pointer;}
        .coins{font-size:40px; color:#facc15;}
    </style>
</head>
<body>
    <div class="app">
        <h2 id="tgName">Player</h2>
        <h1>Coins: <span id="coins">0</span></h1>
        <h3>Energy: <span id="energy">100/100</span></h3>
        <button class="tap-btn" id="tapBtn">⚡</button>
    </div>
    <script type="module" src="./app.js"></script>
</body>
</html>
